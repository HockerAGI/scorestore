<body>

  <!-- SPLASH -->
  <div id="splash" class="splash" aria-hidden="false">
    <div class="splashInner">
      <img class="splashLogo" src="/assets/logo-score.webp" alt="SCORE STORE" />
      <div class="splashBar"><span></span></div>
      <div class="splashHint">Cargando…</div>
    </div>
  </div>

  <!-- HEADER -->
  <header class="topbar">
    <div class="wrap topbarInner">
      <a class="brand" href="#top" aria-label="SCORE STORE">
        <img class="brandMark" src="/assets/logo-score.webp" alt="SCORE" />
        <span class="brandText">SCORE STORE</span>
      </a>

      <nav class="topNav">
        <a href="#catalogo" class="navLink">Catálogo</a>
        <a href="#partners" class="navLink">Partners</a>
        <a href="#faq" class="navLink">FAQ</a>
      </nav>

      <div class="topActions">
        <button class="iconBtn" type="button" onclick="openDrawerCompat()" aria-label="Abrir carrito">
          <i class="fa-solid fa-bag-shopping"></i>
          <span id="cartCount" class="badge">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <main id="top" class="hero">
    <div class="heroBg"></div>

    <div class="wrap heroInner">
      <div class="heroCopy">
        <div class="heroKicker">SCORE INTERNATIONAL</div>

        <h1 class="heroTitle">
          Merch oficial y drops por carrera.
        </h1>

        <p class="heroSub">
          Fabricado por <b>Único Uniformes</b>, patrocinador oficial.
        </p>

        <div class="heroCtas">
          <a href="#catalogo" class="btn primary">Ver catálogo</a>
          <button type="button" class="btn ghost" onclick="openDrawerCompat()">Ver carrito</button>
        </div>

        <div class="shipPanel" aria-label="Opciones de entrega">
          <div class="shipRow">
            <label class="radioPill">
              <input type="radio" name="shipModeHero" value="pickup" checked onchange="toggleShippingCompat('pickup')">
              <span>Pickup</span>
            </label>
            <label class="radioPill">
              <input type="radio" name="shipModeHero" value="mx" onchange="toggleShippingCompat('mx')">
              <span>México</span>
            </label>
            <label class="radioPill">
              <input type="radio" name="shipModeHero" value="us" onchange="toggleShippingCompat('us')">
              <span>USA</span>
            </label>
          </div>

          <div id="zipWrapHero" class="zipWrap" style="display:none">
            <input id="zipInputHero" class="zipInput" inputmode="numeric" placeholder="Código postal" />
            <button class="btn small" type="button" onclick="quoteShippingUICompat()">Cotizar envío</button>
          </div>

          <div class="shipHint">
            <span id="shipLabelHero">Pickup Gratis</span>
          </div>
        </div>
      </div>

      <div class="heroVisual">
        <img class="heroImg" src="/assets/hero.webp" alt="SCORE STORE hero" />
        <div class="heroBadges">
          <img class="heroBadge" src="/assets/logo-world-desert.webp" alt="World Desert Championship" />
          <img class="heroBadge" src="/assets/logo-baja1000.webp" alt="Baja 1000" />
          <img class="heroBadge" src="/assets/logo-baja500.webp" alt="Baja 500" />
          <img class="heroBadge" src="/assets/logo-baja400.webp" alt="Baja 400" />
          <img class="heroBadge" src="/assets/logo-sf250.webp" alt="San Felipe 250" />
        </div>
      </div>
    </div>
  </main>

  <!-- CATALOGO -->
  <section id="catalogo" class="section">
    <div class="wrap">
      <div class="sectionHead">
        <h2 class="sectionTitle">Catálogo</h2>
        <p class="sectionSub">Colecciones por carrera y drops limitados.</p>
      </div>

      <div id="chips" class="chips"></div>

      <div id="productsGrid" class="productsGrid"></div>
    </div>
  </section>
