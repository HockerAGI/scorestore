[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ========= API -> Netlify Functions =========
# Permite rutas limpias como /api/create_checkout en lugar de /.netlify/functions/create_checkout
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# ========= SPA fallback =========
# Para que PWA e index.html manejen rutas si hay 404
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ========= Headers de Seguridad y PWA =========
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Access-Control-Allow-Origin = "*"

# Cache agresivo para assets visuales estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# CORRECCIÓN QUIRÚRGICA: Evita cachear JSON de catálogo y promos para actualizaciones en vivo
[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Content-Type para Web Manifest (Vital para PWA Lighthouse)
[[headers]]
  for = "/*.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json; charset=utf-8"
